services:
  remoola_postgres:
    container_name: remoola_postgres
    image: postgres:latest
    env_file:
      - ../apps/api/.env.$NODE_ENV
    ports:
      - "5433:5432"
    volumes:
      - remoola_postgres_data:/data/db
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - remoola_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wirebill} -d ${POSTGRES_DB:-wirebill}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  remoola_adminer:
    container_name: remoola_adminer
    image: adminer
    restart: unless-stopped
    ports:
      - "9999:8080"
    networks:
      - remoola_network

volumes:
  remoola_postgres_data:


networks:
  remoola_network:
    driver: bridge
